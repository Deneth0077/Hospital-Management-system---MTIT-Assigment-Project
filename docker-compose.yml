
services:
  # 1. Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_AUTH_API_URL=http://localhost:5000/api
        - VITE_WARD_API_URL=http://localhost:8080/api
        - VITE_DOCTOR_API_URL=http://localhost:8081/api
        - VITE_PATIENT_API_URL=http://localhost:8082/api
        - VITE_APPOINTMENT_API_URL=http://localhost:8083/api
        - VITE_PHARMACY_API_URL=http://localhost:8084/api
        - VITE_LAB_API_URL=http://localhost:8085/api
    ports:
      - "5173:80"
    depends_on:
      - auth-backend
      - ward-service

  # 2. Login Auth (Node.js)
  auth-backend:
    build:
      context: "./node backend"
    ports:
      - "5000:5000"

  # 3. Ward Service (Spring Boot + MongoDB Atlas)
  ward-service:
    build:
      context: "./Ward-Management/springboot backed"
    ports:
      - "8080:8080"
    restart: always
    environment:
      - 'SPRING_PROFILES_ACTIVE=default'

